<!DOCTYPE html>
<html>
    <head>
        <style>
            .box{
                width: 100px;
                height: 100px;
                background-color: red;
                transition: 2s;
            }
            .box:hover{
                background-color: blue;
                transform: rotate(90deg);
                transform: scale(1.2);
            }
        </style>
    </head> 
    <body>
        <div class="box"></div>
