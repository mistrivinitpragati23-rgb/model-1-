<!DOCTYPE html>
<html>
<head>
    <title>My Shopping Cart - Student Food Corner</title>
    <!-- Link to our custom CSS file -->
    <link rel="stylesheet" href="style.css">
    <!-- jQuery for loading header/footer -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</head>
<body>
    <!-- Header Placeholder -->
    <div id="header-area"></div>

    <div class="container">
        <h2 class="page-title">🛒 Your Shopping Cart</h2>
        <p class="subtitle">Review your selected items before proceeding to payment.</p>
        <hr>
        
        <!-- Cart Table -->
        <table class="custom-cart-table">
            <thead>
                <tr>
                    <th>Food Image</th>
                    <th>Item Name</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
            </thead>
            <!-- JavaScript will inject the rows into this tbody -->
            <tbody id="cart-body-items">
                <!-- Example of what JS will generate: -->
                <!--
                <tr>
                    <td><img src="..." class="cart-img"></td>
                    <td><b>Special Veg Burger</b></td>
                    <td>₹120</td>
                    <td>
                        <button class="qty-btn">-</button>
                        <span class="qty-text">2</span>
                        <button class="qty-btn">+</button>
                    </td>
                    <td class="row-total">₹240</td>
                    <td><button class="remove-btn">Remove</button></td>
                </tr>
                -->
            </tbody>
        </table>

        <!-- Order Summary Box -->
        <div class="cart-summary-box">
            <h3>Order Summary</h3>
            <hr>
            <p>Delivery Charges: <b>₹40</b></p>
            <h2 id="final-total" class="grand-total-text">Final Amount: ₹0</h2>
            <br>
            <div class="cart-buttons">
                <a href="products.html" class="my-btn secondary-btn">← Continue Shopping</a>
                <a href="payment.html" class="my-btn primary-btn">Proceed to Payment →</a>
            </div>
        </div>

        <!-- Clear floating elements -->
        <div class="clear-float"></div>
    </div>

    <!-- Footer Placeholder -->
    <div id="footer-area"></div>
</body>
</html>
