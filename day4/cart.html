<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="stlye.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <div id="header-placeholder"></div>
    <main>
        <h2>Your Shopping Cart</h2>
        <table style="width: 100%; margin-top: 20px; background: white; padding: 20px; border-radius: 8px; text-align: left; border-collapse: collapse; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
            <tr style="background: #eee;">
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Total</th>
            </tr>
            <tr>
                <td>Classic Beef Burger</td>
                <td>200</td>
                <td>2</td>
                <td>400</td>
            </tr>
        </table>
        <div style="text-align: right; margin-top: 20px;">
            <h3>Subtotal: $400.00</h3>
            <a href="payment.html" class="btn">Proceed to Payment</a>
        </div>
    </main>
    <div id="footer-placeholder"></div>
</body>
</html>
