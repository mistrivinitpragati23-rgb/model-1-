<!DOCTYPE html>
<html>
<head>
    <title>Irregular Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 70%;
            text-align: center;
            font-size: 22px;
        }
        td, th {
            border: 2px solid black;
            padding: 15px;
        }
    </style>
</head>
<body>

<table>
    <!-- Row 1 -->
    <tr>
        <th colspan="2">A</th>
        <th colspan="4">B</th>
        <th rowspan="4">J</th>
    </tr>

    <!-- Row 2 -->
    <tr>
        <td>C</td>
        <td>D</td>
        <td>E</td>
        <td>F</td>
        <td>G</td>
        <td>H</td>
    </tr>

    <!-- Row 3 -->
    <tr>
        <td rowspan="2">K</td>
        <td>M</td>
        <td colspan="2">N</td>
        <td colspan="2">I</td>
    </tr>

    <!-- Row 4 -->
    <tr>
        <td>L</td>
        <td>P</td>
        <td>O</td>
        <td>I</td>
        <td>H</td>
    </tr>

</table>

</body>
</html>
