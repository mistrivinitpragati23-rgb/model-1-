<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - FoodieHaven</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .detail-wrapper {
            background: white;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            padding: 40px;
            margin-top: 40px;
            margin-bottom: 40px;
        }
        .detail-img {
            width: 100%;
            max-height: 450px;
            object-fit: cover;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
        }
        .detail-info {
            padding: 20px;
        }
        .price-tag {
            font-size: 2.2rem;
            color: var(--primary);
            font-weight: 700;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="header"></div>

    <main class="container">
        <div class="detail-wrapper">
            <div class="row g-5 align-items-center">
                <!-- Left side: Image -->
                <div class="col-md-6">
                    <img src="images/burger.jpg" alt="Classic Beef Burger" class="detail-img">
                </div>
                <!-- Right side: Info -->
                <div class="col-md-6">
                    <div class="detail-info">
                        <span class="badge bg-danger mb-2">Bestseller</span>
                        <h1 class="fw-bold mb-3">Classic Beef Burger</h1>
                        <p class="text-muted">Available in Fast Food Menu</p>
                        <div class="price-tag">₹150</div>
                        <p class="fs-5 text-secondary mb-4">A juicy, 100% gourmet beef patty cooked to perfection, topped with melted cheddar, fresh hand-picked lettuce, ripe tomatoes, and our secret recipe house sauce, served toasted on a fresh brioche bun.</p>
                        
                        <div class="d-flex align-items-center gap-3 mb-4">
                            <label class="fw-bold text-dark fs-5">Qty:</label>
                            <input type="number" id="detail-qty" value="1" min="1" max="10" class="form-control" style="width: 80px; padding: 10px; border-radius: 8px;">
                        </div>

                        <button class="btn btn-hom py-3 px-5 fs-5 w-100 detail-add-btn" data-name="Classic Beef Burger" data-price="150" data-img="images/burger.jpg">
                            Add to Cart
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
