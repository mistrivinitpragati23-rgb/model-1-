<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Login - FoodieHaven</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="header"></div>

    <main class="container">
        <div class="login-wrapper">
            <!-- Left Branding Side -->
            <div class="login-image-side">
                <h2>Welcome Back</h2>
                <p>Login to track your recent orders, save your favorite meals, and unlock exclusive student discounts.</p>
            </div>
            
            <!-- Right Form Side -->
            <div class="login-form-side">
                <h2 class="text-center fw-bold mb-4">Account Login</h2>
                
                <form action="index.html" onsubmit="alert('Login Successful! Welcome back.');">
                    <div class="input-group">
                        <label for="user-email">Email Address</label>
                        <input type="email" id="user-email" placeholder="student@example.com" required class="full-width-input">
                    </div>                   
                    
                    <div class="input-group">
                        <label for="user-password">Password</label>
                        <input type="password" id="user-password" placeholder="Enter your password" required class="full-width-input">
                    </div>
                    
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" style="width: 16px; height: 16px; accent-color: var(--primary);"> Remember my login
                        </label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-hom w-100 py-3 mt-2 fs-5" style="border-radius: 30px;">
                        Secure Login
                    </button>
                </form>

                <p class="register-prompt">
                    Don't have an account yet? <br>
                    <a href="registionform.html" class="fw-bold">Click here to Register</a>
                </p>
            </div>
        </div>
    </main>

    <div class="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
