<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Login - Student Food Corner</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container">
        <div class="login-wrapper">
            <div class="login-image-side">
                <h2>Welcome Back</h2>
                <p>Login to track your recent orders, save your favorite meals</p>
            </div>
            
            <div class="login-form-side">
                <h2 style="text-align: center; color: #333;">Account Login</h2>
                <hr style="margin-bottom: 20px;">
                
                <form action="home.html" onsubmit="alert('Login Successful! Welcome back.');">
                    
                    <div class="input-group">
                        <label for="user-email"><b>Email Address:</b></label>
                        <input type="email" id="user-email" placeholder="student@example.com" required class="full-width-input">
                    </div>                   
                    <div class="input-group">
                        <label for="user-password"><b>Password:</b></label>
                        <input type="password" id="user-password" placeholder="Enter your secret password" required class="full-width-input">
                    </div>
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox"> Remember my login
                        </label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>
                    
                    <br>
                    <button type="submit" class="my-btn primary-btn" style="width: 100%; font-size: 18px;">Secure Login</button>
                </form>

                <p class="register-prompt">
                    Don't have an account yet? <br>
                    <a href="registionform.html"><b>Click here to Register</b></a>
                </p>
            </div>
            <div class="clear-float"></div>
        </div>
    </main>
    <div id="footer-placeholder"></div>
</body>
</html>
